x-worker-environment: &worker-environment
  NODE_ENV: development
  AUTH_SERVICE_URL: http://auth:3000
  SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-change-me-service-auth-secret}
  JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
  DATADOG_TOKEN_ID: ${DATADOG_TOKEN_ID}
  DATADOG_TOKEN_SECRET: ${DATADOG_TOKEN_SECRET}
  DATADOG_API_KEY: ${DATADOG_API_KEY}
  DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
  SQS_ENDPOINT: http://localstack:4566
  SQS_REGION: us-east-1
  SQS_QUEUE_TECH_LEAD: tech-lead-queue
  SQS_QUEUE_BACKEND_DEV: backend-dev-queue
  SQS_QUEUE_FRONTEND_DEV: frontend-dev-queue
  SQS_QUEUE_DEVOPS: devops-queue
  SQS_QUEUE_CODE_REVIEWER: code-reviewer-queue
  SQS_VISIBILITY_TIMEOUT_SECONDS: 3600
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test

x-depends-on-ready: &depends-on-ready
  localstack:
    condition: service_healthy
  auth:
    condition: service_started

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  localstack:
    image: localstack/localstack:4.4.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  auth:
    build: ./auth
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/oauth-app
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: http://localhost:3000/api/auth/github/callback
      GITHUB_WEBHOOK_URL: https://cdeb-31-154-18-65.ngrok-free.app/api/webhooks/github
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-webhook-secret}
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-change-me-service-auth-secret}
      DATADOG_TOKEN_ID: ${DATADOG_TOKEN_ID}
      DATADOG_TOKEN_SECRET: ${DATADOG_TOKEN_SECRET}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb

  webhooks:
    build: ./webhooks
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      AUTH_SERVICE_URL: http://auth:3000
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-dev-webhook-secret}
      SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-change-me-service-auth-secret}
      DATADOG_TOKEN_ID: ${DATADOG_TOKEN_ID}
      DATADOG_TOKEN_SECRET: ${DATADOG_TOKEN_SECRET}
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      SQS_ENDPOINT: http://localstack:4566
      SQS_REGION: us-east-1
      SQS_QUEUE_TECH_LEAD: tech-lead-queue
      SQS_QUEUE_BACKEND_DEV: backend-dev-queue
      SQS_QUEUE_FRONTEND_DEV: frontend-dev-queue
      SQS_QUEUE_DEVOPS: devops-queue
      SQS_QUEUE_CODE_REVIEWER: code-reviewer-queue
      SQS_VISIBILITY_TIMEOUT_SECONDS: 3600
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on: *depends-on-ready

  worker-tech-lead:
    build: ./workers
    command: ["node", "dist/worker.js"]
    environment:
      <<: *worker-environment
      WORKER_TYPE: techLead
    depends_on: *depends-on-ready

  worker-backend-dev:
    build: ./workers
    command: ["node", "dist/worker.js"]
    environment:
      <<: *worker-environment
      WORKER_TYPE: backendDev
    depends_on: *depends-on-ready

  worker-frontend-dev:
    build: ./workers
    command: ["node", "dist/worker.js"]
    environment:
      <<: *worker-environment
      WORKER_TYPE: frontendDev
    depends_on: *depends-on-ready

  worker-devops:
    build: ./workers
    command: ["node", "dist/worker.js"]
    environment:
      <<: *worker-environment
      WORKER_TYPE: devOps
    depends_on: *depends-on-ready

  worker-code-reviewer:
    build: ./workers
    command: ["node", "dist/worker.js"]
    environment:
      <<: *worker-environment
      WORKER_TYPE: codeReviewer
    depends_on: *depends-on-ready

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:80"
    depends_on:
      - auth

volumes:
  mongo_data:
  localstack_data:
