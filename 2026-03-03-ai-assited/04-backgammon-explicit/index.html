<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backgammon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="api-key-modal" class="modal">
    <div class="modal-content">
      <h2>Enter OpenAI API Key</h2>
      <p>Your API key is never stored; it is only kept in memory for this session.</p>
      <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
      <button type="button" id="api-key-submit">Start Game</button>
      <p id="api-key-error" class="error-text"></p>
    </div>
  </div>

  <div id="game-container" class="hidden">
    <header class="game-header">
      <h1>Backgammon</h1>
      <div id="status"></div>
      <div id="dice-container">
        <div id="human-dice" class="dice-row"></div>
        <div id="ai-dice" class="dice-row"></div>
      </div>
    </header>

    <div id="board-wrap">
      <div id="board">
        <div id="points-container"></div>
        <div id="bar">
          <div id="bar-top" class="bar-half"></div>
          <div id="bar-bottom" class="bar-half"></div>
        </div>
      </div>
    </div>

    <div id="move-prompt">
      <span id="move-prompt-text"></span>
    </div>

    <div id="controls">
      <button type="button" id="roll-btn">Roll Dice</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
